deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
    path_prefix: /var/loki
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: 2024-04-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

# Enable the Single Binary (Monolith) mode
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi

# CRITICAL: Explicitly disable the distributed microservices
# to stop the validation error
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
gateway:
  replicas: 0