apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: IfNotPresent  # <--- CRITICAL FOR LOCAL DEV
          env:
            - name: DB_HOST
              value: "mysql"
            - name: DB_PASSWORD
              value: "secret"
            - name: LOG_CHANNEL
              value: "stderr"            # Send logs to FluentBit
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  type: LoadBalancer
  selector:
    app: auth-service
  ports:
    - port: 8000
      targetPort: 8000